name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-astro-attendsalon-r
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Upload to Cloudflare Pages
        run: npx wrangler pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Pages の wrangler.toml は account_id 非対応。ID は公開情報のため workflow に直書き（secret 未設定時の CI 失敗回避）
          CLOUDFLARE_ACCOUNT_ID: b3b5ca3b50c86c3d707da6c629483c49
